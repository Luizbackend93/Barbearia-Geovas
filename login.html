<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login - Barbearia Geovas</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

</head>

<body>

<div class="login-container">

<div class="login-box">

<img src="img/logo.png.jpeg" class="logo">

<h2>Login Administrador</h2>

<input
type="email"
id="user"
placeholder="Email"
autocomplete="email"
required
>

<input
type="password"
id="pass"
placeholder="Senha"
required
>

<button onclick="login()">
Entrar
</button>

</div>

</div>

<script type="module" src="script.js"></script>

</body>
</html>
