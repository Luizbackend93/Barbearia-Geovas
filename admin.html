<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Painel Admin - Barbearia Geovas</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<!-- HEADER PREMIUM -->

<header class="admin-header">

<div class="admin-title">

<img src="img/logo.png.jpeg" class="logo">

<h1>Barbearia Geovas</h1>

</div>

<button class="btn-sair" onclick="logout()">
Sair
</button>

</header>

<!-- DASHBOARD -->

<section class="admin-dashboard">

<div class="cards-admin">

<div class="card-admin">

<h3>📅 Hoje</h3>

<p id="agendamentosHoje">0</p>

</div>

<div class="card-admin">

<h3>👤 Próximo Cliente</h3>

<p id="proximoCliente">Nenhum</p>

</div>

<div class="card-admin">

<h3>💰 Hoje</h3>

<p id="faturamentoHoje">R$0</p>

</div>

<div class="card-admin">

<p id="faturamentoSemana">R$0</p>

</div>

<div class="card-admin">

<h3>🗓️ Mês</h3>

<p id="faturamentoMes">R$0</p>

</div>

<div class="card-admin">

<h3>🔥 Mais Vendido</h3>

<p id="servicoTop">Nenhum</p>

</div>

</div>

<!-- LISTA -->

<div class="lista-agendamentos">

<h2>📋 Lista de Agendamentos</h2>

<div id="listaAgendamentos"></div>

</div>

</section>

<script type="module" src="script.js"></script>
